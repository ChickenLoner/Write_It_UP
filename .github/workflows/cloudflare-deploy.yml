name: Cloudflare Pages

# Publishes to the Cloudflare Pages PRODUCTION deployment on every push to
# main, alongside deploy.yml which still publishes to GitHub Pages. Running
# both during the transition is deliberate: each host holds a current copy, so
# rolling back is a DNS change and nothing else.
#
# The deploy must target the production branch (main). Custom domains serve the
# production deployment only — a preview deployment is not reachable from
# writeups.chicken0248.fyi no matter where DNS points.
#
# Why Direct Upload rather than Cloudflare's git integration: Cloudflare caps
# builds at 20 minutes on every plan, and the cold WebP encode of ~7.5k
# screenshots takes longer than that. Building here keeps the .imgcache
# actions/cache, so the encode is paid once and never again.
#
# Requires repo secrets CLOUDFLARE_API_TOKEN (Account → Cloudflare Pages →
# Edit) and CLOUDFLARE_ACCOUNT_ID.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

# Two pushes in quick succession would otherwise race, and whichever upload
# finished last would win — potentially publishing the older build. Superseded
# runs are cancelled; a cancelled wrangler upload never completes its
# deployment, so the currently live one stays untouched.
concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

env:
  CF_PROJECT: write-it-up

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install markdown2 pillow

      - name: Restore image encode cache
        uses: actions/cache@v4
        with:
          path: .imgcache
          key: imgcache-${{ github.sha }}
          restore-keys: |
            imgcache-

      - name: Convert Markdown to HTML
        run: python build_md_to_html_with_toc.py

      # Cloudflare's free plan allows 20,000 files per deployment. Fail loudly
      # here rather than partway through an upload.
      # The deploy replaces the live site with whatever is in build/. Refuse to
      # upload something obviously wrong rather than publish it over a working
      # site. The build already fails on render errors; this catches a build
      # that "succeeded" but produced a structurally broken tree.
      - name: Sanity-check the built site
        run: |
          test -s build/index.html || { echo "::error::build/index.html missing or empty"; exit 1; }
          test -s build/404.html   || { echo "::error::build/404.html missing or empty"; exit 1; }
          pages=$(find build -name '*.html' | wc -l)
          echo "built $pages HTML pages"
          if [ "$pages" -lt 100 ]; then
            echo "::error::only $pages HTML pages — expected hundreds. Refusing to publish."
            exit 1
          fi
          index_bytes=$(wc -c < build/index.html)
          if [ "$index_bytes" -lt 50000 ]; then
            echo "::error::index.html is only $index_bytes bytes — the card list is probably empty"
            exit 1
          fi
          grep -q 'class="wrow"' build/index.html || {
            echo "::error::index.html contains no write-up cards"; exit 1; }

      - name: Check deployment fits Cloudflare limits
        run: |
          files=$(find build -type f | wc -l)
          echo "build/ contains $files files ($(du -sh build | cut -f1))"
          if [ "$files" -gt 19000 ]; then
            echo "::error::$files files — approaching the 20,000/deployment free-plan limit"
            exit 1
          fi
          if [ "$files" -gt 15000 ]; then
            echo "::warning::$files files — over 75% of the 20,000 free-plan limit"
          fi
          big=$(find build -type f -size +25M | head -5)
          if [ -n "$big" ]; then
            echo "::error::files over the 25 MiB per-asset limit:"; echo "$big"; exit 1
          fi

      # Invoking wrangler directly rather than via cloudflare/wrangler-action:
      # the action runs `npx wrangler` without --yes, and npm 11 on the runner
      # refuses to auto-install non-interactively ("npx canceled due to missing
      # packages and no YES option"). wrangler picks the credentials up from
      # the environment.
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is empty or unset"
            exit 1
          fi
          npx --yes wrangler@4 pages deploy build \
            --project-name="$CF_PROJECT" \
            --branch=main
