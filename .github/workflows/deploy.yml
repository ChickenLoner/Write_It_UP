name: Build and Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install markdown2 pillow

      # Resource filenames are content hashes, so a cached WebP stays valid
      # forever. Only newly added screenshots are ever encoded.
      - name: Restore image encode cache
        uses: actions/cache@v4
        with:
          path: .imgcache
          key: imgcache-${{ github.sha }}
          restore-keys: |
            imgcache-

      - name: Convert Markdown to HTML
        run: python build_md_to_html_with_toc.py

      - name: Report published site size
        run: du -sh build build/resources

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4